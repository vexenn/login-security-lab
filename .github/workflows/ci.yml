name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository code
        uses: actions/checkout@v4

      - name: Set up Node.js runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: npm ci

      - name: Run code quality linting verification
        run: npm run lint

      - name: Run automated security & API testing suites
        run: npm test

      - name: Execute application build optimization
        run: npm run build