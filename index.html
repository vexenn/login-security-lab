<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager Console</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="loginView" class="auth-container">
        <h2>Account Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" required autocomplete="email" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="loginPassword">Security Password</label>
                <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Authenticate</button>
        </form>
        <div id="loginMessage" class="alert-box hidden"></div>
        <p class="auth-switch-text">New user? <span onclick="switchView('registerView')">Create an account</span></p>
    </div>

    <div id="registerView" class="auth-container hidden">
        <h2>User Registration</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label for="regPassword">Account Password</label>
                <input type="password" id="regPassword" required minlength="6" placeholder="Minimum 6 characters">
            </div>
            <button type="submit" class="btn-primary">Register System Identity</button>
        </form>
        <div id="regMessage" class="alert-box hidden"></div>
        <p class="auth-switch-text">Already have an identity? <span onclick="switchView('loginView')">Sign in here</span></p>
    </div>

    <div id="dashboardView" class="dashboard-workspace hidden">
        
        <aside class="sidebar-panel">
            <div class="sidebar-title">Control Hub</div>
            <div class="theme-workspace-box">
                <label class="form-group"><span style="font-size:0.85rem; font-weight:600; color:var(--text-secondary);">Visual Theme</span></label>
                <div class="theme-grid">
                    <div class="theme-btn" onclick="applyTheme('dark')">Dark Onyx</div>
                    <div class="theme-btn" onclick="applyTheme('light')">Light Slate</div>
                    <div class="theme-btn" onclick="applyTheme('cyberpunk')">Neon Cyber</div>
                    <div class="theme-btn" onclick="applyTheme('emerald')">Emerald</div>
                </div>
            </div>
            
            <div class="sidebar-title" style="margin-top:2rem;">Identity Profile</div>
            <p id="userWelcome" style="font-weight:600; margin-bottom:0.25rem;"></p>
            <p id="userEmailTag" style="font-size:0.85rem; color:var(--text-secondary);"></p>
            <button class="btn-logout" onclick="executeLogout()">Terminate Session</button>
        </aside>

        <main class="main-stage">
            
            <section class="analytics-bar">
                <div class="analytics-card"><h3>Total Tasks</h3><div id="metricTotal" class="metric-val">0</div></div>
                <div class="analytics-card" style="border-top:3px solid var(--success);"><h3>Completed</h3><div id="metricCompleted" class="metric-val">0</div></div>
                <div class="analytics-card" style="border-top:3px solid var(--warning);"><h3>Pending</h3><div id="metricPending" class="metric-val">0</div></div>
                <div class="analytics-card" style="border-top:3px solid var(--danger);"><h3>Overdue</h3><div id="metricOverdue" class="metric-val">0</div></div>
            </section>

            <section class="action-deck">
                <h3 style="margin-bottom:1rem; font-size:1.1rem;">Create New Management Task</h3>
                <form id="taskCreateForm" class="task-form-grid">
                    <div>
                        <label style="font-size:0.75rem; color:var(--text-secondary); font-weight:700;">TASK TITLE</label>
                        <input type="text" id="taskTitle" required placeholder="Acquire system specifications...">
                    </div>
                    <div>
                        <label style="font-size:0.75rem; color:var(--text-secondary); font-weight:700;">CATEGORY</label>
                        <select id="taskCategory">
                            <option value="Work">Work</option><option value="Personal">Personal</option>
                            <option value="Learning">Learning</option><option value="Meetings">Meetings</option>
                            <option value="Development">Development</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.75rem; color:var(--text-secondary); font-weight:700;">PRIORITY</label>
                        <select id="taskPriority">
                            <option value="High">High</option><option value="Medium" selected>Medium</option><option value="Low">Low</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.75rem; color:var(--text-secondary); font-weight:700;">STATUS</label>
                        <select id="taskStatus">
                            <option value="Pending" selected>Pending</option><option value="In Progress">In Progress</option><option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.75rem; color:var(--text-secondary); font-weight:700;">DUE DATE</label>
                        <input type="date" id="taskDueDate" required>
                    </div>
                    <button type="submit" class="btn-primary" style="padding:0.6rem 1.2rem;">Commit</button>
                </form>
            </section>

            <section class="action-deck">
                <div style="font-size:1.1rem; font-weight:700;">Search & Workspace Filtering Options</div>
                <div class="filter-grid">
                    <input type="text" id="filterSearch" placeholder="Search task name substring entries..." oninput="fetchApplicationTasks()">
                    <select id="filterCategory" onchange="fetchApplicationTasks()">
                        <option value="">All Categories Selected</option><option value="Work">Work</option>
                        <option value="Personal">Personal</option><option value="Learning">Learning</option>
                        <option value="Meetings">Meetings</option><option value="Development">Development</option>
                    </select>
                    <select id="filterPriority" onchange="fetchApplicationTasks()">
                        <option value="">All Priority Levels</option><option value="High">High</option>
                        <option value="Medium">Medium</option><option value="Low">Low</option>
                    </select>
                    <select id="filterStatus" onchange="fetchApplicationTasks()">
                        <option value="">All Operational Statuses</option><option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option><option value="Completed">Completed</option>
                    </select>
                </div>
            </section>

            <section id="taskViewport" class="task-grid-viewport"></section>

        </main>
    </div>

    <script>
        const API_BASE = "http://localhost:5000";
        let cachedTasks = [];

        // Initialization lifecycle hook
        window.addEventListener("DOMContentLoaded", () => {
            const preservedTheme = localStorage.getItem("workspaceTheme") || "dark";
            applyTheme(preservedTheme);

            if (localStorage.getItem("authToken")) {
                parseAndMountDashboard();
            } else {
                switchView("loginView");
            }
        });

        function applyTheme(themeName) {
            document.documentElement.setAttribute("data-theme", themeName);
            localStorage.setItem("workspaceTheme", themeName);
        }

        function switchView(viewId) {
            ["loginView", "registerView", "dashboardView"].forEach(id => {
                document.getElementById(id).classList.add("hidden");
            });
            document.getElementById(viewId).classList.remove("hidden");
        }

        function showMessage(elementId, text, type) {
            const target = document.getElementById(elementId);
            target.textContent = text;
            target.className = `alert-box ${type}`;
        }

        // ==========================================
        // AUTHENTICATION LOGIC PIPELINE BROKERS
        // ==========================================
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;
            
            try {
                const res = await fetch(`${API_BASE}/users/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || "Authentication structural block verified.");
                
                localStorage.setItem("authToken", data.token);
                parseAndMountDashboard();
            } catch (err) {
                showMessage("loginMessage", err.message, "error");
            }
        });

        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("regName").value;
            const email = document.getElementById("regEmail").value;
            const password = document.getElementById("regPassword").value;
            
            try {
                const res = await fetch(`${API_BASE}/users/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || "Registration validation error.");
                
                showMessage("loginMessage", "Identity built successfully! Please sign in.", "success");
                switchView("loginView");
                document.getElementById("registerForm").reset();
            } catch (err) {
                showMessage("regMessage", err.message, "error");
            }
        });

        function parseAndMountDashboard() {
            const token = localStorage.getItem("authToken");
            if (!token) return executeLogout();

            try {
                // Decode payload metadata strings securely
                const payloadBase64 = token.split(".")[1];
                const meta = JSON.parse(atob(payloadBase64));
                
                document.getElementById("userWelcome").textContent = `Welcome, ${meta.name || "Operator"}`;
                document.getElementById("userEmailTag").textContent = meta.email || "";
                
                switchView("dashboardView");
                fetchApplicationTasks();
            } catch (e) {
                executeLogout();
            }
        }

        function executeLogout() {
            localStorage.removeItem("authToken");
            switchView("loginView");
            document.getElementById("loginForm").reset();
            document.getElementById("loginMessage").classList.add("hidden");
        }

        // ==========================================
        // TASK MANAGEMENT CRUD OPERATIONS LAYER
        // ==========================================
        document.getElementById("taskCreateForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const token = localStorage.getItem("authToken");
            
            const payload = {
                title: document.getElementById("taskTitle").value,
                category: document.getElementById("taskCategory").value,
                priority: document.getElementById("taskPriority").value,
                status: document.getElementById("taskStatus").value,
                dueDate: document.getElementById("taskDueDate").value
            };

            try {
                const res = await fetch(`${API_BASE}/tasks`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Could not commit new task parameterization matrix.");
                
                document.getElementById("taskCreateForm").reset();
                fetchApplicationTasks();
            } catch (err) {
                alert(err.message);
            }
        });

        async function fetchApplicationTasks() {
            const token = localStorage.getItem("authToken");
            if (!token) return;

            // Construct multi-conditional filter query strings dynamically
            const search = document.getElementById("filterSearch").value;
            const category = document.getElementById("filterCategory").value;
            const priority = document.getElementById("filterPriority").value;
            const status = document.getElementById("filterStatus").value;

            let queryUrl = `${API_BASE}/tasks?_t=${Date.now()}`;
            if (search) queryUrl += `&search=${encodeURIComponent(search)}`;
            if (category) queryUrl += `&category=${encodeURIComponent(category)}`;
            if (priority) queryUrl += `&priority=${encodeURIComponent(priority)}`;
            if (status) queryUrl += `&status=${encodeURIComponent(status)}`;

            try {
                const res = await fetch(queryUrl, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!res.ok) throw new Error("Failure processing tasks lookup array.");
                const tasks = await res.json();

                cachedTasks = tasks;
                
                renderTaskGrid(tasks);
                calculateAnalyticsMetrics(tasks);
            } catch (err) {
                console.error(err);
            }
        }

        function renderTaskGrid(tasks) {
            const container = document.getElementById("taskViewport");
            container.innerHTML = "";

            if (tasks.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-secondary); font-weight:600;">No active tasks matched your current profile query.</div>`;
                return;
            }

            tasks.forEach(task => {
                const row = document.createElement("div");
                row.className = `task-item-row priority-${task.priority}`;
                
                row.innerHTML = `
                    <div class="task-info-block">
                        <h4>${escapeHtml(task.title)}</h4>
                        <p>Identifier Matrix: #${task.taskId}</p>
                    </div>
                    <div class="pill-badge">${task.category}</div>
                    <div class="pill-badge" style="border-color: var(--text-secondary); color: var(--text-secondary);">${task.priority}</div>
                    <div>
                        <select onchange="updateTaskStatus(${task.taskId}, this.value)" style="padding:0.3rem; background:var(--bg-card); color:var(--text-primary); border:1px solid var(--border-color); border-radius:4px;">
                            <option value="Pending" ${task.status === "Pending" ? "selected" : ""}>Pending</option>
                            <option value="In Progress" ${task.status === "In Progress" ? "selected" : ""}>In Progress</option>
                            <option value="Completed" ${task.status === "Completed" ? "selected" : ""}>Completed</option>
                        </select>
                    </div>
                    <div style="font-size:0.9rem; font-weight:600; color:var(--text-secondary);">${task.dueDate || "N/A"}</div>
                    <button class="btn-delete-action" onclick="deleteTaskRecord(${task.taskId})">Purge</button>
                `;
                container.appendChild(row);
            });
        }

        async function updateTaskStatus(taskId, currentStatusValue) {
            const token = localStorage.getItem("authToken");

            const targetTask = cachedTasks.find(t => t.taskId === taskId);
            if (!targetTask) return;

            const payload = {
                title: targetTask.title,
                category: targetTask.category,
                priority: targetTask.priority,
                status: currentStatusValue,
                dueDate: targetTask.dueDate
            };

            try {
                // Fetch current base variables to update without context destruction
                const res = await fetch(`${API_BASE}/tasks/${taskId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Status transformation state rejected.");
                fetchApplicationTasks();
            } catch (err) {
                alert(err.message);
            }
        }

        async function deleteTaskRecord(taskId) {
            if (!confirm("Are you sure you want to permanently eliminate this task sequence?")) return;
            const token = localStorage.getItem("authToken");
            
            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!res.ok) throw new Error("Purge authorization failure.");
                fetchApplicationTasks();
            } catch (err) {
                alert(err.message);
            }
        }

        // ==========================================
        // DYNAMIC STATISTICAL CALCULATOR ENGINE
        // ==========================================
        function calculateAnalyticsMetrics(tasks) {
            const todayStr = new Date().toISOString().split('T')[0];
            
            let total = tasks.length;
            let completed = 0;
            let pending = 0;
            let overdue = 0;

            tasks.forEach(task => {
                if (task.status === "Completed") {
                    completed++;
                } else {
                    pending++;
                    if (task.dueDate && task.dueDate < todayStr) {
                        overdue++;
                    }
                }
            });

            document.getElementById("metricTotal").textContent = total;
            document.getElementById("metricCompleted").textContent = completed;
            document.getElementById("metricPending").textContent = pending;
            document.getElementById("metricOverdue").textContent = overdue;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
