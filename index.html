<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Auth Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="login-card">
        <h2>Secure Login Portal</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Authenticate</button>
        </form>
        <div id="messageBox" class="message"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const messageBox = document.getElementById('messageBox');

            messageBox.textContent = '';
            messageBox.className = 'message';

            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    messageBox.textContent = data.error || 'Authentication failed.';
                    messageBox.classList.add('error');
                    return;
                }

                if (data.token) {
                    messageBox.textContent = 'Login successful! Token issued.';
                    messageBox.classList.add('success');
                    localStorage.setItem('authToken', data.token);
                }

            } catch (err) {
                messageBox.textContent = 'Unable to connect to the authentication server.';
                messageBox.classList.add('error');
            }
        });
    </script>
</body>
</html>
